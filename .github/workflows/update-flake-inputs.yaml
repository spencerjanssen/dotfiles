name: Update Flake Inputs
on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  update-flake-inputs:
    runs-on: ubuntu-latest
    steps:
      - uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31.10.4
      - name: Generate GitHub token
        uses: actions/create-github-app-token@7bd03711494f032dfa3be3558f7dc8787b0be333 # v3.1.0
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          # update-flake-inputs needs to push changes, hence needs credentials
          persist-credentials: true
      - name: Update flake inputs
        uses: mic92/update-flake-inputs@1e056167bd2101e587bd39deb2f64909b4759652 # v1.0.4
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          auto-merge: 'true'
